<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hubble Tuning Fork</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
    overflow-x: hidden;
  }

  h1 {
    font-size: 1.3rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #c8c8d8;
    text-align: center;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 0.82rem;
    font-family: 'JetBrains Mono', monospace;
    color: #555566;
    letter-spacing: 0.06em;
    margin-bottom: 28px;
    text-align: center;
  }

  /* ── diagram canvas ── */
  #diagram {
    position: relative;
    width: 820px;
    max-width: 100%;
  }

  svg#fork {
    width: 100%;
    height: auto;
    overflow: visible;
  }

  /* galaxy nodes */
  .gnode {
    cursor: pointer;
    transition: filter 0.2s;
  }
  .gnode:hover { filter: brightness(1.35) drop-shadow(0 0 8px rgba(255,255,255,0.3)); }
  .gnode.active { filter: brightness(1.5) drop-shadow(0 0 14px rgba(200,180,255,0.5)); }

  .node-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    fill: #aaaacc;
    pointer-events: none;
    text-anchor: middle;
  }

  /* ── info panel ── */
  #info-panel {
    margin-top: 24px;
    width: 820px;
    max-width: 100%;
    min-height: 160px;
    background: #10101a;
    border: 1px solid #222233;
    border-radius: 4px;
    padding: 22px 28px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 18px;
    transition: opacity 0.3s;
  }

  #info-panel.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.5;
  }

  .info-placeholder {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: #444455;
    letter-spacing: 0.08em;
  }

  .info-block h2 {
    font-size: 1.05rem;
    font-weight: 400;
    color: #e8e8f8;
    margin-bottom: 4px;
  }
  .info-block .type-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    padding: 2px 7px;
    border-radius: 2px;
    display: inline-block;
    margin-bottom: 10px;
  }
  .info-block p {
    font-size: 0.9rem;
    line-height: 1.6;
    color: #aaaab8;
    font-weight: 300;
  }

  .stat-block { display: flex; flex-direction: column; gap: 10px; }
  .stat-row { display: flex; flex-direction: column; gap: 3px; }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: #555566;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .stat-bar-wrap {
    height: 5px;
    background: #1e1e2e;
    border-radius: 2px;
    overflow: hidden;
  }
  .stat-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: #9999bb;
  }

  .data-block { display: flex; flex-direction: column; gap: 8px; }
  .data-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid #1a1a2a;
    padding-bottom: 6px;
  }
  .data-key {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: #555577;
    letter-spacing: 0.05em;
  }
  .data-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: #b0b0cc;
  }

  /* axis labels */
  .axis-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    fill: #444455;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<h1>The Hubble Tuning Fork</h1>
<p class="subtitle">click any galaxy type to explore</p>

<div id="diagram">
<svg id="fork" viewBox="0 0 820 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Elliptical galaxy gradients (E0 → E7, getting more elongated) -->
    <radialGradient id="gE0" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5c892" stop-opacity="1"/>
      <stop offset="60%" stop-color="#c8844a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8b5020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gE3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5c892" stop-opacity="1"/>
      <stop offset="60%" stop-color="#c8844a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8b5020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gE7" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c080" stop-opacity="1"/>
      <stop offset="55%" stop-color="#b87040" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7a3a10" stop-opacity="0"/>
    </radialGradient>
    <!-- S0 -->
    <radialGradient id="gS0" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0d090" stop-opacity="1"/>
      <stop offset="50%" stop-color="#b88848" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#705030" stop-opacity="0"/>
    </radialGradient>
    <!-- Spiral gradients -->
    <radialGradient id="gSa" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe0a0" stop-opacity="1"/>
      <stop offset="40%" stop-color="#88aaff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3355aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gSb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd880" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#6699ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2244aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gSc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffcc60" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#5588ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1133aa" stop-opacity="0"/>
    </radialGradient>
    <!-- Barred spirals -->
    <radialGradient id="gSBa" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe0a0" stop-opacity="1"/>
      <stop offset="40%" stop-color="#88aaff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3355aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gSBb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd880" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#6699ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2244aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gSBc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffcc60" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#5588ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1133aa" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── backbone line ── -->
  <line x1="120" y1="170" x2="390" y2="170" stroke="#2a2a3a" stroke-width="1.5"/>
  <!-- upper arm -->
  <path d="M390,170 Q460,130 560,90" stroke="#2a2a3a" stroke-width="1.5" fill="none"/>
  <!-- lower arm -->
  <path d="M390,170 Q460,210 560,250" stroke="#2a2a3a" stroke-width="1.5" fill="none"/>

  <!-- ── axis labels ── -->
  <text x="80" y="310" class="axis-label">← more elliptical</text>
  <text x="580" y="310" class="axis-label">more disc-like →</text>
  <text x="60"  y="88"  class="axis-label" transform="rotate(-90,60,88)">tighter arms →</text>

  <!-- direction arrows -->
  <text x="110" y="198" class="axis-label" fill="#333344">redder / older</text>
  <text x="550" y="198" class="axis-label" fill="#333344">bluer / younger</text>

  <!-- ══ ELLIPTICALS ══ -->
  <!-- E0 -->
  <g class="gnode" data-type="E0" transform="translate(105,170)">
    <ellipse rx="28" ry="28" fill="url(#gE0)" filter="url(#glow)"/>
    <text y="42" class="node-label">E0</text>
  </g>
  <!-- E3 -->
  <g class="gnode" data-type="E3" transform="translate(195,170)">
    <ellipse rx="32" ry="22" fill="url(#gE3)" filter="url(#glow)"/>
    <text y="38" class="node-label">E3</text>
  </g>
  <!-- E7 -->
  <g class="gnode" data-type="E7" transform="translate(295,170)">
    <ellipse rx="36" ry="16" fill="url(#gE7)" filter="url(#glow)"/>
    <text y="32" class="node-label">E7</text>
  </g>

  <!-- ══ S0 (lenticular) ══ -->
  <g class="gnode" data-type="S0" transform="translate(390,170)">
    <ellipse rx="30" ry="12" fill="url(#gS0)" filter="url(#glow)"/>
    <!-- subtle disc hint -->
    <ellipse rx="44" ry="6" fill="#b87848" fill-opacity="0.18"/>
    <text y="28" class="node-label">S0</text>
  </g>

  <!-- ══ SPIRALS (upper arm) ══ -->
  <!-- Sa -->
  <g class="gnode" data-type="Sa" transform="translate(490,118)">
    <!-- disc -->
    <ellipse rx="34" ry="10" fill="#3355aa" fill-opacity="0.25"/>
    <!-- bulge -->
    <ellipse rx="16" ry="10" fill="url(#gSa)" filter="url(#glow)"/>
    <!-- tight arms -->
    <path d="M0,0 Q8,-18 18,-8" stroke="#7799ff" stroke-width="1.2" fill="none" stroke-opacity="0.7"/>
    <path d="M0,0 Q-8,18 -18,8" stroke="#7799ff" stroke-width="1.2" fill="none" stroke-opacity="0.7"/>
    <text y="26" class="node-label">Sa</text>
  </g>
  <!-- Sb -->
  <g class="gnode" data-type="Sb" transform="translate(580,88)">
    <ellipse rx="38" ry="11" fill="#2244aa" fill-opacity="0.25"/>
    <ellipse rx="13" ry="9" fill="url(#gSb)" filter="url(#glow)"/>
    <path d="M0,0 Q14,-22 26,-10" stroke="#6688ff" stroke-width="1.2" fill="none" stroke-opacity="0.7"/>
    <path d="M0,0 Q-14,22 -26,10" stroke="#6688ff" stroke-width="1.2" fill="none" stroke-opacity="0.7"/>
    <path d="M0,0 Q10,-26 22,-16" stroke="#6688ff" stroke-width="0.8" fill="none" stroke-opacity="0.4"/>
    <text y="28" class="node-label">Sb</text>
  </g>
  <!-- Sc -->
  <g class="gnode" data-type="Sc" transform="translate(675,60)">
    <ellipse rx="42" ry="12" fill="#1133aa" fill-opacity="0.22"/>
    <ellipse rx="10" ry="8" fill="url(#gSc)" filter="url(#glow)"/>
    <path d="M0,0 Q18,-26 32,-12" stroke="#5577ff" stroke-width="1.2" fill="none" stroke-opacity="0.7"/>
    <path d="M0,0 Q-18,26 -32,12" stroke="#5577ff" stroke-width="1.2" fill="none" stroke-opacity="0.7"/>
    <path d="M0,0 Q12,-30 28,-20" stroke="#5577ff" stroke-width="0.8" fill="none" stroke-opacity="0.4"/>
    <path d="M0,0 Q22,-18 36,-6" stroke="#5577ff" stroke-width="0.6" fill="none" stroke-opacity="0.3"/>
    <text y="30" class="node-label">Sc</text>
  </g>

  <!-- ══ BARRED SPIRALS (lower arm) ══ -->
  <!-- SBa -->
  <g class="gnode" data-type="SBa" transform="translate(490,222)">
    <ellipse rx="34" ry="10" fill="#3355aa" fill-opacity="0.22"/>
    <ellipse rx="16" ry="10" fill="url(#gSBa)" filter="url(#glow)"/>
    <!-- bar -->
    <rect x="-18" y="-3" width="36" height="6" rx="2" fill="#ffdd99" fill-opacity="0.35"/>
    <!-- tight arms from bar ends -->
    <path d="M18,0 Q22,-14 14,-20" stroke="#7799ff" stroke-width="1.2" fill="none" stroke-opacity="0.7"/>
    <path d="M-18,0 Q-22,14 -14,20" stroke="#7799ff" stroke-width="1.2" fill="none" stroke-opacity="0.7"/>
    <text y="26" class="node-label">SBa</text>
  </g>
  <!-- SBb -->
  <g class="gnode" data-type="SBb" transform="translate(580,252)">
    <ellipse rx="38" ry="11" fill="#2244aa" fill-opacity="0.22"/>
    <ellipse rx="13" ry="9" fill="url(#gSBb)" filter="url(#glow)"/>
    <rect x="-20" y="-3.5" width="40" height="7" rx="2" fill="#ffcc88" fill-opacity="0.3"/>
    <path d="M20,0 Q28,-18 18,-26" stroke="#6688ff" stroke-width="1.2" fill="none" stroke-opacity="0.7"/>
    <path d="M-20,0 Q-28,18 -18,26" stroke="#6688ff" stroke-width="1.2" fill="none" stroke-opacity="0.7"/>
    <text y="28" class="node-label">SBb</text>
  </g>
  <!-- SBc -->
  <g class="gnode" data-type="SBc" transform="translate(675,280)">
    <ellipse rx="42" ry="12" fill="#1133aa" fill-opacity="0.20"/>
    <ellipse rx="10" ry="8" fill="url(#gSBc)" filter="url(#glow)"/>
    <rect x="-22" y="-3.5" width="44" height="7" rx="2" fill="#ffbb77" fill-opacity="0.28"/>
    <path d="M22,0 Q34,-20 24,-30" stroke="#5577ff" stroke-width="1.2" fill="none" stroke-opacity="0.7"/>
    <path d="M-22,0 Q-34,20 -24,30" stroke="#5577ff" stroke-width="1.2" fill="none" stroke-opacity="0.7"/>
    <path d="M22,0 Q36,-12 30,-24" stroke="#5577ff" stroke-width="0.7" fill="none" stroke-opacity="0.35"/>
    <text y="30" class="node-label">SBc</text>
  </g>

  <!-- arm type labels -->
  <text x="640" y="46" class="axis-label" fill="#336699" font-size="9">normal spirals</text>
  <text x="628" y="296" class="axis-label" fill="#336699" font-size="9">barred spirals</text>
</svg>
</div>

<!-- ── info panel ── -->
<div id="info-panel" class="empty">
  <span class="info-placeholder">← click a galaxy type to learn more</span>
</div>

<script>
const DATA = {
  E0: {
    name: "Elliptical — E0",
    tag: "ELLIPTICAL", tagColor: "#c8844a",
    desc: "Perfectly spherical elliptical galaxy. Old, red stars dominate — star formation has completely ceased. Smooth, featureless light profile following a de Vaucouleurs r¼ law. Often found at the centres of galaxy clusters.",
    stats: { "Star formation": 0.02, "Disc structure": 0.0, "Bulge dominance": 1.0, "Gas fraction": 0.03 },
    data: { "g − r colour": "~0.85–0.95", "Concentration C": "~3.0–3.5", "Sérsic n": "~4", "Typical mass": "10⁹–10¹³ M☉" }
  },
  E3: {
    name: "Elliptical — E3",
    tag: "ELLIPTICAL", tagColor: "#c8844a",
    desc: "Moderately flattened elliptical. The number indicates the ellipticity: E3 means the minor axis is 70% of the major axis. Still featureless and red — the flattening may reflect the galaxy's rotation or viewing angle.",
    stats: { "Star formation": 0.02, "Disc structure": 0.05, "Bulge dominance": 0.95, "Gas fraction": 0.04 },
    data: { "g − r colour": "~0.82–0.92", "Concentration C": "~2.8–3.3", "Sérsic n": "~3.5–4", "Ellipticity": "0.3" }
  },
  E7: {
    name: "Elliptical — E7",
    tag: "ELLIPTICAL", tagColor: "#c8844a",
    desc: "Maximally flattened elliptical — the minor axis is only 30% of the major axis. At this extreme flattening, the distinction between an E7 and a disc galaxy (S0) becomes subtle. Some E7s may actually be disc systems seen edge-on.",
    stats: { "Star formation": 0.03, "Disc structure": 0.15, "Bulge dominance": 0.88, "Gas fraction": 0.05 },
    data: { "g − r colour": "~0.78–0.90", "Concentration C": "~2.5–3.2", "Sérsic n": "~3–4", "Ellipticity": "0.7" }
  },
  S0: {
    name: "Lenticular — S0",
    tag: "LENTICULAR", tagColor: "#b08848",
    desc: "The bridge between ellipticals and spirals. S0 galaxies have a disc — like spirals — but no spiral arms and essentially no star formation — like ellipticals. They may be quenched spirals that lost their gas through ram-pressure stripping or strangulation.",
    stats: { "Star formation": 0.08, "Disc structure": 0.7, "Bulge dominance": 0.65, "Gas fraction": 0.10 },
    data: { "g − r colour": "~0.65–0.85", "Concentration C": "~2.5–3.0", "fracDeV_r": "~0.5–0.9", "Typical mass": "10¹⁰–10¹² M☉" }
  },
  Sa: {
    name: "Spiral — Sa",
    tag: "SPIRAL", tagColor: "#5577cc",
    desc: "Early-type spiral with a large central bulge and tightly wound arms. The arms are smooth and regular. Star formation is ongoing but modest. More evolved than Sb and Sc — the large bulge suggests a longer history of mass assembly.",
    stats: { "Star formation": 0.40, "Disc structure": 0.80, "Bulge dominance": 0.55, "Gas fraction": 0.22 },
    data: { "g − r colour": "~0.45–0.65", "Concentration C": "~2.5–3.0", "Arm winding": "Tight", "Bulge/Total": "~0.4–0.6" }
  },
  Sb: {
    name: "Spiral — Sb",
    tag: "SPIRAL", tagColor: "#5577cc",
    desc: "Intermediate spiral — a moderate bulge with more open arms than Sa. The Milky Way is thought to be an Sb or SBb galaxy. Active star formation in the arms, with the disc and bulge contributing roughly equally to the total light.",
    stats: { "Star formation": 0.62, "Disc structure": 0.88, "Bulge dominance": 0.38, "Gas fraction": 0.32 },
    data: { "g − r colour": "~0.35–0.55", "Concentration C": "~2.2–2.8", "Arm winding": "Moderate", "Bulge/Total": "~0.2–0.4" }
  },
  Sc: {
    name: "Spiral — Sc",
    tag: "SPIRAL", tagColor: "#5577cc",
    desc: "Late-type spiral with a tiny bulge and loosely wound, patchy arms rich in young blue stars and H II regions. Highest star formation rate among spirals. The disc completely dominates — there is almost no central concentration.",
    stats: { "Star formation": 0.88, "Disc structure": 0.97, "Bulge dominance": 0.10, "Gas fraction": 0.50 },
    data: { "g − r colour": "~0.20–0.42", "Concentration C": "~1.8–2.3", "Arm winding": "Loose", "Bulge/Total": "< 0.1" }
  },
  SBa: {
    name: "Barred Spiral — SBa",
    tag: "BARRED SPIRAL", tagColor: "#4488bb",
    desc: "Barred spiral with a prominent central bar and tightly wound arms emerging from the bar ends. The bar is a stellar structure that channels gas toward the nucleus, potentially fuelling both star formation and the central black hole. Large bulge, modest star formation.",
    stats: { "Star formation": 0.38, "Disc structure": 0.82, "Bulge dominance": 0.52, "Gas fraction": 0.24 },
    data: { "g − r colour": "~0.45–0.65", "Concentration C": "~2.4–3.0", "Bar strength": "Strong", "Bulge/Total": "~0.4–0.6" }
  },
  SBb: {
    name: "Barred Spiral — SBb",
    tag: "BARRED SPIRAL", tagColor: "#4488bb",
    desc: "Intermediate barred spiral. Roughly half of all disc galaxies have bars, including the Milky Way. The bar rotates as a rigid structure at a fixed pattern speed, driving gas inflows and spiral arm formation. Active star formation throughout the disc.",
    stats: { "Star formation": 0.60, "Disc structure": 0.90, "Bulge dominance": 0.35, "Gas fraction": 0.34 },
    data: { "g − r colour": "~0.33–0.52", "Concentration C": "~2.1–2.7", "Bar strength": "Strong", "Bulge/Total": "~0.2–0.4" }
  },
  SBc: {
    name: "Barred Spiral — SBc",
    tag: "BARRED SPIRAL", tagColor: "#4488bb",
    desc: "Late-type barred spiral with a small bulge, prominent bar, and loosely wound arms. Maximum star formation rate. The loosely wrapped arms contain large star-forming complexes and bright HII regions visible even in distant galaxies.",
    stats: { "Star formation": 0.92, "Disc structure": 0.97, "Bulge dominance": 0.08, "Gas fraction": 0.52 },
    data: { "g − r colour": "~0.18–0.40", "Concentration C": "~1.8–2.2", "Bar strength": "Strong", "Bulge/Total": "< 0.1" }
  }
};

const statColors = {
  "Star formation": "#74c7ec",
  "Disc structure": "#6688ee",
  "Bulge dominance": "#f38ba8",
  "Gas fraction": "#69db7c"
};

let activeNode = null;

document.querySelectorAll('.gnode').forEach(node => {
  node.addEventListener('click', () => {
    const type = node.dataset.type;
    if (activeNode) activeNode.classList.remove('active');
    node.classList.add('active');
    activeNode = node;
    showInfo(type);
  });
});

function showInfo(type) {
  const d = DATA[type];
  const panel = document.getElementById('info-panel');
  panel.classList.remove('empty');

  panel.innerHTML = `
    <div class="info-block">
      <h2>${d.name}</h2>
      <span class="type-tag" style="background:${d.tagColor}22;color:${d.tagColor};border:1px solid ${d.tagColor}44">${d.tag}</span>
      <p>${d.desc}</p>
    </div>

    <div class="stat-block">
      ${Object.entries(d.stats).map(([k, v]) => `
        <div class="stat-row">
          <span class="stat-label">${k}</span>
          <div class="stat-bar-wrap">
            <div class="stat-bar" style="width:${v*100}%;background:${statColors[k] || '#8888aa'}"></div>
          </div>
          <span class="stat-value">${Math.round(v*100)}%</span>
        </div>
      `).join('')}
    </div>

    <div class="data-block">
      ${Object.entries(d.data).map(([k, v]) => `
        <div class="data-row">
          <span class="data-key">${k}</span>
          <span class="data-val">${v}</span>
        </div>
      `).join('')}
    </div>
  `;

  // Animate bars in
  requestAnimationFrame(() => {
    panel.querySelectorAll('.stat-bar').forEach(bar => {
      const w = bar.style.width;
      bar.style.width = '0';
      requestAnimationFrame(() => { bar.style.width = w; });
    });
  });
}

// Start with E0 selected
document.querySelector('[data-type="E0"]').click();
</script>
</body>
</html>
